<!DOCTYPE html>
<html lang="en">

<head>
    <title>
        Show Stamper
    </title>
    <link rel="icon" href="./images/icononly_transparent.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <script src="javascript/FileSaver.js"></script>
</head>

<body class="body">
    <div id="content-container" class="content-container">
        <div id="logo-container" class="logo-container">
            <img class="img-logo" src="./images/FullLogo_Caption_Transparent.png" alt="Show Stamper logo" />
        </div>
        <div id="inner-content-container" class="inner-content-container">
        <div class="title-container" id="title-container">
            <div class="label-div">
                <label class="timestamps-label">Create a new video log:</label>
            </div>
            <div class="title-row">
                <input class="title-input" type="text" id="title"
                    placeholder="What is the title of the video log?" aria-label="Video log title" />
                <button class="btn-submit" id="title-submit">Submit</button>
            </div>

            <!-- Timing source selection -->
            <div class="timing-mode-container" id="timing-mode-container">
                <label class="timestamps-label">Timing source:</label>
                <div class="timing-mode-options">
                    <label class="timing-radio-label">
                        <input type="radio" name="timing-mode" id="mode-manual" value="manual" checked>
                        Manual Timer
                    </label>
                    <label class="timing-radio-label">
                        <input type="radio" name="timing-mode" id="mode-youtube" value="youtube">
                        YouTube Stream
                    </label>
                    <label class="timing-radio-label">
                        <input type="radio" name="timing-mode" id="mode-wallclock" value="wallclock">
                        Wall Clock
                    </label>
                </div>
                <div id="youtube-url-row" class="title-row" style="display:none">
                    <input class="title-input" type="url" id="youtube-url"
                        placeholder="YouTube URL or video ID"
                        aria-label="YouTube stream URL" />
                </div>
            </div>
        </div>
        <div class="or-container" id="or-container">
            <p>OR</p>
        </div>
        <div class="select-container" id="select-container">
            <div class="label-div">
                <label class="timestamps-label">Upload an existing video log:</label>
            </div>
            <div class="select-row">
                <input class="timestamp-path" id="txt-path" type="text" placeholder="c:\\" aria-label="Path to existing video log file" />
                <button class="btn-select" id="btn-stamp-loader">Select</button>
            </div>
        </div>
    </div>
    </div>
    <script src="javascript/HackTimer.js"></script>
    <script src="javascript/HackTimerWorker.js"></script>
    <script type="module" src="javascript/TimeStamp.js"></script>
    <script type="module" src="javascript/java.js"></script>
</body>
</html>
