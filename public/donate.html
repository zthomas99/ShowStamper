<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/donation-style.css">
    <title>Donation - ShowStamper</title>
</head>
<body>
    <!-- Top Section with Image -->
    <div class="image-section">
        <img src="./images/donation/logoText.png" alt="Donation Image">
    </div>

    <!-- Second Section with Description -->
    <div class="text-section">
        <p style="text-align: center; font-family:Georgia, 'Times New Roman', Times, serif; font-weight: 600; font-size: larger;"">
           If this site has benefited you in any way, please consider making a donation for the upkeep of the site by clicking the link below.
        </p>
        <h2 class="donation-title" style="margin-top: 40px;">What Your Donation Goes To</h2>
        <ul style="text-align: center; width: 50%; margin:0 auto;">
            <li>Domain expenses</li>
            <li>Development of new features that will incorporate popular video streaming sites such as youtube.</li>
          </ul>  
    </div>

    <!-- Third Section with Donate Button -->
    <div class="link-section">
        <a href="https://www.paypal.com/donate/?hosted_button_id=RUQ2FJWENDCZG" class="button">Donate Now</a>
    </div>
</body>
</html>
